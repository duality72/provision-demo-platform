name: Onboard Connector

on:
  workflow_dispatch:
    inputs:
      connector_name:
        description: 'Name of the connector'
        required: true
        type: string
      connector_type:
        description: 'Type of connector (s3, postgres, rest-api, sftp)'
        required: true
        type: string
      encrypted_payload:
        description: 'Base64-encoded age-encrypted JSON payload'
        required: true
        type: string
      requested_by:
        description: 'Email of the requesting user'
        required: true
        type: string
      branch_name:
        description: 'Branch name for the PR'
        required: true
        type: string

permissions:
  id-token: write
  contents: write
  pull-requests: write

jobs:
  onboard:
    runs-on: ubuntu-latest
    steps:
      - name: Validate inputs
        run: |
          # Connector name: lowercase, numbers, hyphens, 2-63 chars
          if ! echo "${{ inputs.connector_name }}" | grep -qE '^[a-z0-9][a-z0-9\-]{0,61}[a-z0-9]$'; then
            echo "::error::Invalid connector_name: must be 2-63 characters, lowercase letters, numbers, and hyphens"
            exit 1
          fi
          # Connector type: must be one of the known types
          case "${{ inputs.connector_type }}" in
            s3|postgres|rest-api|sftp) ;;
            *) echo "::error::Invalid connector_type '${{ inputs.connector_type }}'. Must be one of: s3, postgres, rest-api, sftp"; exit 1 ;;
          esac
          # Branch name: must start with feat/onboard-
          if ! echo "${{ inputs.branch_name }}" | grep -qE '^feat/onboard-'; then
            echo "::error::Invalid branch_name: must start with feat/onboard-"
            exit 1
          fi

      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Verify connector does not already exist
        run: |
          if [ -d "connectors/${{ inputs.connector_name }}" ]; then
            echo "::error::Connector 'connectors/${{ inputs.connector_name }}' already exists on main"
            exit 1
          fi

      - name: Install age
        run: |
          sudo apt-get update && sudo apt-get install -y age

      - name: Install SOPS
        run: |
          SOPS_VERSION=3.8.1
          curl -LO "https://github.com/getsops/sops/releases/download/v${SOPS_VERSION}/sops-v${SOPS_VERSION}.linux.amd64"
          chmod +x "sops-v${SOPS_VERSION}.linux.amd64"
          sudo mv "sops-v${SOPS_VERSION}.linux.amd64" /usr/local/bin/sops

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - name: Decrypt payload
        run: |
          echo "${{ inputs.encrypted_payload }}" | base64 -d > encrypted_payload.age
          echo "${{ secrets.AGE_SECRET_KEY }}" | age -d -i - encrypted_payload.age > payload.json

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Generate connector files
        env:
          SOPS_KMS_ARN: ${{ secrets.SOPS_KMS_ARN }}
        run: |
          python .github/scripts/generate_connector.py \
            --connector-type "${{ inputs.connector_type }}" \
            --connector-name "${{ inputs.connector_name }}" \
            --payload-file payload.json

      - name: Clean up sensitive files
        if: always()
        run: |
          rm -f payload.json encrypted_payload.age

      - name: Create branch and commit
        run: |
          git config user.name "provision-bot"
          git config user.email "provision-bot@users.noreply.github.com"
          BRANCH="${{ inputs.branch_name }}"
          git checkout -b "$BRANCH"
          git add "connectors/${{ inputs.connector_name }}/"
          git commit -m "Add connector: ${{ inputs.connector_name }} (${{ inputs.connector_type }})

          Requested by: ${{ inputs.requested_by }}"
          git push origin "$BRANCH"

      - name: Create Pull Request
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          BRANCH="${{ inputs.branch_name }}"
          gh pr create \
            --title "Onboard connector: ${{ inputs.connector_name }}" \
            --body "## New Connector Request

          **Name:** ${{ inputs.connector_name }}
          **Type:** ${{ inputs.connector_type }}
          **Requested by:** ${{ inputs.requested_by }}

          ### Files
          - \`connectors/${{ inputs.connector_name }}/config.json\` — connector configuration
          - \`connectors/${{ inputs.connector_name }}/secrets.enc.json\` — encrypted secrets (if applicable)

          ### Review Checklist
          - [ ] Verify connector configuration fields are correct
          - [ ] Verify encrypted secrets file exists (if required for this type)
          - [ ] Approve to complete onboarding" \
            --base main \
            --head "$BRANCH"
